name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
    - name: Build TypeScript
      run: npm run build
    - name: Run unit tests
      run: npm run test
    - name: Run simulated runner
      run: npm run simulate || true
